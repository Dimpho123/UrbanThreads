<!DOCTYPE html>
<html>
<head>
  <title>Urban Threads</title>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- 🔝 NAVBAR -->
<nav class="nav">
  <h1 class="logo">URBAN THREADS</h1>

  <!-- ✅ FIXED CATEGORY BUTTONS -->
  <div class="categories">
    <button onclick="goToCategory('All')">All</button>
    <button onclick="goToCategory('Hoodies')">Hoodies</button>
    <button onclick="goToCategory('T-shirts')">T-Shirts</button>
    <button onclick="goToCategory('Sneakers')">Sneakers</button>
    <button onclick="goToCategory('Accessories')">Accessories</button>
  </div>

  <div class="nav-icons">
    <span class="material-symbols-outlined">search</span>
    <span class="material-symbols-outlined" onclick="goToLogin()">person</span>
    <span class="material-symbols-outlined" onclick="goToCart()">shopping_cart</span>
  </div>
</nav>

<!-- 🔥 SPLIT HERO -->
<section class="split-hero">

  <div class="hero-card hoodies">
    <div class="overlay">
      <button onclick="goToCategory('Hoodies')">SHOP HOODIES</button>
    </div>
  </div>

  <div class="hero-card tshirts">
    <div class="overlay">
      <button onclick="goToCategory('T-shirts')">SHOP T-SHIRTS</button>
    </div>
  </div>

</section>

<!-- ✅ SCRIPT -->
<script type="module" src="js/index.js"></script>

</body>
</html>
