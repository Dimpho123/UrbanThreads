<!DOCTYPE html>
<html>
<head>
  <title>Urban Threads - Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
   <link rel="stylesheet" href="styles.css">
</head>
<body>




<!-- 🔝 NAVBAR -->
<nav class="nav">
  <h1 class="logo">URBAN THREADS</h1>

  <!-- ✅ FIXED CATEGORY BUTTONS -->
  <div class="categories">
    <button onclick="goToCategory('All')">All</button>
    <button onclick="goToCategory('Hoodies')">Hoodies</button>
    <button onclick="goToCategory('T-shirts')">T-Shirts</button>
    <button onclick="goToCategory('Sneakers')">Sneakers</button>
    <button onclick="goToCategory('Accessories')">Accessories</button>
  </div>

  <div class="nav-icons">
    <span class="material-symbols-outlined">search</span>
    <span class="material-symbols-outlined" onclick="goToLogin()">person</span>
       <span class="material-symbols-outlined" onclick="goToCart()">shopping_cart</span>
    
  </div>
</nav>
<!--  PRODUCTS -->
<div id="products" class="products">
  <!-- Products will load here -->
</div>

<!-- 💤 EMPTY STATE -->
<p id="empty" style="text-align:center; display:none;">
  No products found 😢
</p>

<!-- 🔌 SCRIPTS -->
<script type="module" src="js/shop.js"></script>


</body>
</html>
