<!DOCTYPE html>
<html>
<head>
  <title>Login - Urban Threads</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="auth-page">

<div class="auth-wrapper">

  
  <!-- FORM-->
  <div class="auth-right">

    <div class="auth-card">
      <h2 id="form-title">Login</h2>

      <!-- LOGIN -->
      <div id="login-form">
        <input id="login-email" placeholder="Email" />
        <input id="login-password" type="password" placeholder="Password" />

        <button onclick="login()" class="auth-btn">Login</button>

        <p class="switch-text">
          Don't have an account?
          <span onclick="showSignup()">Sign up</span>
        </p>
      </div>

      <!-- SIGNUP -->
      <div id="signup-form" style="display:none;">
        <input id="signup-name" placeholder="Full Name" />
        <input id="signup-email" placeholder="Email" />
        <input id="signup-password" type="password" placeholder="Password" />

        <button onclick="signup()" class="auth-btn">Create Account</button>

        <p class="switch-text">
          Already have an account?
          <span onclick="showLogin()">Login</span>
        </p>
      </div>

    </div>

  </div>

</div>



<footer class="footer">

  <div class="footer-container">

    <!-- BRAND -->
    <div class="footer-section">
      <h2>URBAN THREADS</h2>
      <p>Streetwear that defines your vibe. Premium quality. Modern culture.</p>
    </div>

    <!-- SHOP -->
    <div class="footer-section">
      <h3>Shop</h3>
      <p onclick="goToCategory('Hoodies')">Hoodies</p>
      <p onclick="goToCategory('T-shirts')">T-Shirts</p>
      <p onclick="goToCategory('Sneakers')">Sneakers</p>
      <p onclick="goToCategory('Accessories')">Accessories</p>
    </div>

    <!-- HELP -->
    <div class="footer-section">
      <h3>Help</h3>
      <p>Shipping</p>
      <p>Returns</p>
      <p>Contact Us</p>
      <p>FAQs</p>
    </div>

    <!-- SOCIAL -->
    <div class="footer-section">
      <h3>Follow Us</h3>
      <div class="socials">
  <a href="#"><i class="fab fa-instagram"></i></a>
  <a href="#"><i class="fab fa-twitter"></i></a>
  <a href="#"><i class="fab fa-tiktok"></i></a>
</div>
    </div>

  </div>

  <div class="footer-bottom">
    <p>© 2026 Urban Threads. All rights reserved.</p>
  </div>

</footer>
<script type="module" src="js/auth.js"></script>

</body>
</html>
