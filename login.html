<!DOCTYPE html>
<html>
<head>
  <title>Login - Urban Threads</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="auth-page">

<div class="auth-wrapper">

  
  <!-- RIGHT SIDE (FORM) -->
  <div class="auth-right">

    <div class="auth-card">
      <h2 id="form-title">Login</h2>

      <!-- LOGIN -->
      <div id="login-form">
        <input id="login-email" placeholder="Email" />
        <input id="login-password" type="password" placeholder="Password" />

        <button onclick="login()" class="auth-btn">Login</button>

        <p class="switch-text">
          Don't have an account?
          <span onclick="showSignup()">Sign up</span>
        </p>
      </div>

      <!-- SIGNUP -->
      <div id="signup-form" style="display:none;">
        <input id="signup-name" placeholder="Full Name" />
        <input id="signup-email" placeholder="Email" />
        <input id="signup-password" type="password" placeholder="Password" />

        <button onclick="signup()" class="auth-btn">Create Account</button>

        <p class="switch-text">
          Already have an account?
          <span onclick="showLogin()">Login</span>
        </p>
      </div>

    </div>

  </div>

</div>

<script type="module" src="js/auth.js"></script>

</body>
</html>
