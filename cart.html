<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
<link rel="stylesheet" href="styles.css">
<title>Cart</title>
</head>
<body>

<h2>Your Cart <span class="material-symbols-outlined" onclick="goToCart()">Shopping_Cart</span>
 </h2>

<div class="cart-container">
  <div id="cart"></div>

  <div class="checkout">
    <h3 id="total"></h3>
    <button onclick="checkout()">Checkout</button>
    
    
     <button onclick="logout()">Logout</button>
  </div>
</div>
<button onclick="goBack()">Back</button>


<footer class="footer">

  <div class="footer-container">

    <!-- BRAND -->
    <div class="footer-section">
      <h2>URBAN THREADS</h2>
      <p>Streetwear that defines your vibe. Premium quality. Modern culture.</p>
    </div>

    <!-- SHOP -->
    <div class="footer-section">
      <h3>Shop</h3>
      <p onclick="goToCategory('Hoodies')">Hoodies</p>
      <p onclick="goToCategory('T-shirts')">T-Shirts</p>
      <p onclick="goToCategory('Sneakers')">Sneakers</p>
      <p onclick="goToCategory('Accessories')">Accessories</p>
    </div>

    <!-- HELP -->
    <div class="footer-section">
      <h3>Help</h3>
      <p>Shipping</p>
      <p>Returns</p>
      <p>Contact Us</p>
      <p>FAQs</p>
    </div>

    <!-- SOCIAL -->
    <div class="footer-section">
      <h3>Follow Us</h3>
      <div class="socials">
  <a href="#"><i class="fab fa-instagram"></i></a>
  <a href="#"><i class="fab fa-twitter"></i></a>
  <a href="#"><i class="fab fa-tiktok"></i></a>
</div>
    </div>

  </div>

  <div class="footer-bottom">
    <p>© 2026 Urban Threads. All rights reserved.</p>
  </div>

</footer>
<script type="module" src="js/cart.js"></script>
<script type="module" src="js/auth.js"></script>

</body>
</html>
