<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
<link rel="stylesheet" href="styles.css">
<title>Cart</title>
</head>
<body>

  <nav class="nav">
  <h1 class="logo">URBAN THREADS</h1>

  <!-- CATEGORY BUTTONS -->
  <div class="categories">
    <button onclick="goToCategory('All')">All</button>
    <button onclick="goToCategory('Hoodies')">Hoodies</button>
    <button onclick="goToCategory('T-shirts')">T-Shirts</button>
    <button onclick="goToCategory('Sneakers')">Sneakers</button>
    <button onclick="goToCategory('Accessories')">Accessories</button>
  </div>

  <div class="nav-icons">
    <span class="material-symbols-outlined">search</span>
    <span class="material-symbols-outlined" onclick="goToLogin()">person</span>
    <span class="material-symbols-outlined" onclick="goToCart()">shopping_cart</span>
  </div>
</nav>

<div class="user-summary" id="userSummary"></div>
<div class="cart-container">
  <div id="cart"></div>

  <div class="checkout">
    <h3 id="total"></h3>
    
    
    
    
     <button class="logout-btn" onclick="logout()">
  <span class="material-symbols-outlined">logout</span>
  Logout
</button>
  </div>
</div>
<button class="back-btn" onclick="goBack()">
  <span class="material-symbols-outlined">arrow_back</span>
  Back
</button>
<footer class="footer">

  <div class="footer-container">

    <!-- BRAND -->
    <div class="footer-section">
      <h2>URBAN THREADS</h2>
      <p>Streetwear that defines your vibe. Premium quality. Modern culture.</p>
    </div>

    <!-- SHOP -->
    <div class="footer-section">
      <h3>Shop</h3>
      <p onclick="goToCategory('Hoodies')">Hoodies</p>
      <p onclick="goToCategory('T-shirts')">T-Shirts</p>
      <p onclick="goToCategory('Sneakers')">Sneakers</p>
      <p onclick="goToCategory('Accessories')">Accessories</p>
    </div>

    <!-- HELP -->
    <div class="footer-section">
      <h3>Help</h3>
      <p>Shipping</p>
      <p>Returns</p>
      <p>Contact Us</p>
      <p>FAQs</p>
    </div>

    <!-- SOCIAL -->
    <div class="footer-section">
      <h3>Follow Us</h3>
      <div class="socials">
  <a href="#"><i class="fab fa-instagram"></i></a>
  <a href="#"><i class="fab fa-twitter"></i></a>
  <a href="#"><i class="fab fa-tiktok"></i></a>
</div>
    </div>

  </div>

  <div class="footer-bottom">
    <p>© 2026 Urban Threads. All rights reserved.</p>
  </div>

</footer>





<script type="module" src="js/cart.js"></script>
<script type="module" src="js/auth.js"></script>

</body>
</html>
